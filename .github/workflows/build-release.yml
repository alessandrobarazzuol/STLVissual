name: Build STL Visual Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Find project folder
        shell: pwsh
        run: |
          $bat = Get-ChildItem -Path . -Recurse -Filter "CREA_SETUP_COMPLETO_UN_CLICK.bat" | Select-Object -First 1
          if (-not $bat) {
            Write-Error "Non trovo CREA_SETUP_COMPLETO_UN_CLICK.bat nel repository."
            exit 1
          }

          $iss = Get-ChildItem -Path $bat.Directory.FullName -Filter "setup_inno.iss" | Select-Object -First 1
          if (-not $iss) {
            Write-Error "Trovo il BAT, ma nella stessa cartella non trovo setup_inno.iss."
            exit 1
          }

          "PROJECT_DIR=$($bat.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Cartella progetto trovata: $($bat.Directory.FullName)"

      - name: Run setup batch
        shell: cmd
        run: |
          cd /d "%PROJECT_DIR%"
          call CREA_SETUP_COMPLETO_UN_CLICK.bat

      - name: Collect installer files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-output | Out-Null

          $files = Get-ChildItem -Path . -Recurse -Include *.exe,*.zip -File |
            Where-Object {
              $_.FullName -notmatch "\\.git\\" -and
              $_.FullName -notmatch "\\release-output\\" -and
              $_.FullName -notmatch "\\bin\\Debug\\" -and
              $_.FullName -notmatch "\\obj\\" -and
              (
                $_.Name -match "setup|installer|install|STL|Visual" -or
                $_.DirectoryName -match "Output|Installer|Setup|release|Release"
              )
            } |
            Sort-Object Length -Descending

          if (-not $files -or $files.Count -eq 0) {
            Write-Error "Nessun installer trovato dopo la compilazione."
            exit 1
          }

          foreach ($f in $files) {
            $safeName = $f.Name -replace '[^a-zA-Z0-9._-]', '_'
            $dest = Join-Path "release-output" $safeName
            Copy-Item $f.FullName -Destination $dest -Force
            Write-Host "Aggiunto alla release: $($f.FullName)"
          }

          Get-ChildItem release-output | Format-Table Name, Length

      - name: Create GitHub Release and upload installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "stlvisual-build-${{ github.run_number }}-${{ github.run_attempt }}"
          $title = "STL Visual build ${{ github.run_number }}.${{ github.run_attempt }}"
          $notes = @"
          Release automatica generata da GitHub Actions.

          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          "@

          $assets = Get-ChildItem -Path "release-output" -File | Select-Object -ExpandProperty FullName
          if (-not $assets -or $assets.Count -eq 0) {
            Write-Error "Nessun file da caricare nella Release."
            exit 1
          }

          Write-Host "Creo la Release: $tag"
          gh release create $tag $assets --title $title --notes $notes --target "${{ github.sha }}" --latest
