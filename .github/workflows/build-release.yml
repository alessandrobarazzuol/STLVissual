name: Build STL Visual Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Find project folder
        shell: pwsh
        run: |
          $bat = Get-ChildItem -Path . -Recurse -Filter "CREA_SETUP_COMPLETO_UN_CLICK.bat" | Select-Object -First 1
          if (-not $bat) {
            Write-Error "Non trovo CREA_SETUP_COMPLETO_UN_CLICK.bat nel repository."
            exit 1
          }

          $iss = Get-ChildItem -Path $bat.Directory.FullName -Filter "setup_inno.iss" | Select-Object -First 1
          if (-not $iss) {
            Write-Error "Trovo il BAT, ma nella stessa cartella non trovo setup_inno.iss."
            exit 1
          }

          "PROJECT_DIR=$($bat.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Cartella progetto trovata: $($bat.Directory.FullName)"

      - name: Run setup batch
        shell: cmd
        run: |
          cd /d "%PROJECT_DIR%"
          call CREA_SETUP_COMPLETO_UN_CLICK.bat

      - name: Collect installer files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-output | Out-Null

          $files = Get-ChildItem -Path . -Recurse -Include *.exe,*.zip -File |
            Where-Object {
              $_.FullName -notmatch "\\.git\\" -and
              $_.FullName -notmatch "release-output" -and
              (
                $_.Name -match "setup|installer|install|STL|Visual" -or
                $_.DirectoryName -match "Output|Installer|Setup|release|Release"
              )
            } |
            Sort-Object LastWriteTime -Descending

          if (-not $files -or $files.Count -eq 0) {
            Write-Error "Nessun installer trovato dopo la compilazione."
            exit 1
          }

          foreach ($f in $files) {
            Copy-Item $f.FullName -Destination "release-output" -Force
            Write-Host "Aggiunto alla release: $($f.FullName)"
          }

          Get-ChildItem release-output

      - name: Upload setup artifact backup
        uses: actions/upload-artifact@v4
        with:
          name: STLVisual_Setup
          path: release-output/*
          if-no-files-found: error

      - name: Create unique release tag
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $stamp = Get-Date -Format "yyyyMMdd-HHmmss"
          $tag = "release-$stamp-${{ github.run_number }}-${{ github.run_attempt }}-$shortSha"
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Release tag creato: $tag"

      - name: Create GitHub Release with installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$env:RELEASE_TAG" release-output/* `
            --title "STL Visual $env:RELEASE_TAG" `
            --notes "Release automatica generata da GitHub Actions.`n`nCommit: ${{ github.sha }}`nBranch: ${{ github.ref_name }}" `
            --latest
