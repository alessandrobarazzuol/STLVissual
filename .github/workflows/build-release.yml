name: Build STL Visual Release
run-name: auto Release ${{ github.run_number }}

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Find project folder
        shell: pwsh
        run: |
          $bat = Get-ChildItem -Path . -Recurse -Filter "CREA_SETUP_COMPLETO_UN_CLICK.bat" | Select-Object -First 1
          if (-not $bat) {
            Write-Error "Non trovo CREA_SETUP_COMPLETO_UN_CLICK.bat nel repository."
            exit 1
          }

          $iss = Get-ChildItem -Path $bat.Directory.FullName -Filter "setup_inno.iss" | Select-Object -First 1
          if (-not $iss) {
            Write-Error "Trovo il BAT, ma nella stessa cartella non trovo setup_inno.iss."
            exit 1
          }

          "PROJECT_DIR=$($bat.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Cartella progetto trovata: $($bat.Directory.FullName)"

      - name: Run setup batch
        shell: cmd
        run: |
          cd /d "%PROJECT_DIR%"
          call CREA_SETUP_COMPLETO_UN_CLICK.bat

      - name: Collect installer files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-output | Out-Null

          $files = Get-ChildItem -Path . -Recurse -Include *.exe,*.zip -File |
            Where-Object {
              $_.FullName -notmatch "\\.git\\" -and
              $_.FullName -notmatch "release-output" -and
              $_.FullName -notmatch "\\obj\\" -and
              (
                $_.Name -match "setup|installer|install|STL|Visual" -or
                $_.DirectoryName -match "Output|Installer|Setup|release|Release"
              )
            } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 5

          if (-not $files -or $files.Count -eq 0) {
            Write-Error "Nessun installer trovato dopo la compilazione."
            exit 1
          }

          foreach ($f in $files) {
            $safeName = $f.Name -replace '[^a-zA-Z0-9_.-]', '_'
            $dest = Join-Path "release-output" $safeName
            Copy-Item $f.FullName -Destination $dest -Force
            Write-Host "Aggiunto alla release: $($f.FullName) -> $dest"
          }

          Get-ChildItem release-output | Format-Table Name, Length, LastWriteTime

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: STLVisual_Setup
          path: release-output/*
          if-no-files-found: error

      - name: Create GitHub Release with installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "auto-${{ github.run_number }}"
          $title = "STL Visual auto ${{ github.run_number }}"
          $notes = @"
          Release automatica generata da GitHub Actions.

          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          "@

          $assets = Get-ChildItem -Path "release-output" -File
          if (-not $assets -or $assets.Count -eq 0) {
            Write-Error "Nessun file in release-output da pubblicare nella Release."
            exit 1
          }

          Write-Host "Creo Release: $tag"
          gh release create $tag --repo $env:GITHUB_REPOSITORY --title $title --notes $notes --latest
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          foreach ($asset in $assets) {
            Write-Host "Carico asset nella Release: $($asset.FullName)"
            gh release upload $tag $asset.FullName --repo $env:GITHUB_REPOSITORY --clobber
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          Write-Host "Release creata correttamente:"
          gh release view $tag --repo $env:GITHUB_REPOSITORY --web=false
