name: Build STL Visual Release

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Find project folder
        shell: pwsh
        run: |
          $bat = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter "CREA_SETUP_COMPLETO_UN_CLICK.bat" | Select-Object -First 1
          if (-not $bat) { throw "Non trovo CREA_SETUP_COMPLETO_UN_CLICK.bat nel repository." }

          $iss = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter "setup_inno.iss" | Select-Object -First 1
          if (-not $iss) { throw "Non trovo setup_inno.iss nel repository." }

          "PROJECT_DIR=$($bat.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BAT_PATH=$($bat.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ISS_PATH=$($iss.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "Cartella progetto: $($bat.Directory.FullName)"
          Write-Host "BAT trovato: $($bat.FullName)"
          Write-Host "ISS trovato: $($iss.FullName)"

      - name: Run setup batch
        shell: cmd
        working-directory: ${{ env.PROJECT_DIR }}
        run: call "CREA_SETUP_COMPLETO_UN_CLICK.bat"

      - name: Collect installer files
        shell: pwsh
        run: |
          $dist = Join-Path $env:GITHUB_WORKSPACE "release_files"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $files = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Include *.exe,*.msi,*.zip |
            Where-Object {
              $_.FullName -notmatch '\\.git\\' -and
              $_.FullName -notmatch 'release_files' -and
              ($_.Name -match 'setup|install|STL|Visual|zip' -or $_.Extension -eq '.msi')
            } |
            Sort-Object LastWriteTime -Descending

          if (-not $files -or $files.Count -eq 0) {
            throw "Build riuscita, ma non trovo file installer (.exe/.msi/.zip) da pubblicare. Controlla dove il BAT salva il setup."
          }

          foreach ($f in $files | Select-Object -First 10) {
            Copy-Item $f.FullName -Destination $dist -Force
            Write-Host "Copiato: $($f.FullName)"
          }

          $tag = "build-" + (Get-Date -Format "yyyyMMdd-HHmmss")
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_NAME=STL Visual $tag" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: STLVisual_Setup
          path: release_files/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            Release automatica generata da GitHub Actions.

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
